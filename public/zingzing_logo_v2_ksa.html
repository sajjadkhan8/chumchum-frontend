
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Outfit:wght@800;900&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

.wrap {
  padding: 12px 0 32px;
  display: flex;
  flex-direction: column;
  gap: 40px;
}

.section-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-text-tertiary);
  margin-bottom: 14px;
}

.dark-banner {
  width: 100%;
  background: #060d08;
  border-radius: 20px;
  padding: 36px 40px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 20px;
}

.dark-banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(34,197,94,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,197,94,0.07) 1px, transparent 1px);
  background-size: 28px 28px;
  border-radius: 20px;
}

.dark-banner::after {
  content: '';
  position: absolute;
  width: 260px;
  height: 260px;
  background: radial-gradient(circle, rgba(34,197,94,0.18) 0%, transparent 70%);
  top: -60px;
  left: -40px;
  pointer-events: none;
}

.dark-banner .right-glow {
  position: absolute;
  width: 180px;
  height: 180px;
  background: radial-gradient(circle, rgba(34,197,94,0.1) 0%, transparent 70%);
  bottom: -40px;
  right: 20px;
  pointer-events: none;
}

.mark-dark { position: relative; z-index: 2; flex-shrink: 0; }
.mark-dark svg { display: block; }

.wordmark-dark {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.wordmark-dark .name {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 38px;
  line-height: 1;
  letter-spacing: -0.04em;
  color: #ffffff;
}

.wordmark-dark .name .accent { color: #22c55e; }

.wordmark-dark .sub {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: rgba(34,197,94,0.7);
  text-transform: uppercase;
  padding-left: 2px;
}

.dark-banner .badge {
  position: absolute;
  z-index: 3;
  right: 36px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}

.dark-banner .badge-line {
  width: 40px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #22c55e);
  border-radius: 2px;
}

.dark-banner .badge-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 8px #22c55e;
}

/* LIGHT */
.light-banner {
  width: 100%;
  background: #f8fdf9;
  border: 1.5px solid #bbf7d0;
  border-radius: 20px;
  padding: 36px 40px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  gap: 20px;
}

.light-banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: radial-gradient(circle, #16a34a22 1px, transparent 1px);
  background-size: 22px 22px;
  border-radius: 20px;
}

.light-banner::after {
  content: '';
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(22,163,74,0.12) 0%, transparent 65%);
  top: -80px;
  right: -60px;
  pointer-events: none;
}

.mark-light { position: relative; z-index: 2; flex-shrink: 0; }
.mark-light svg { display: block; }

.wordmark-light {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.wordmark-light .name {
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 38px;
  line-height: 1;
  letter-spacing: -0.04em;
  color: #0a1f0d;
}

.wordmark-light .name .accent { color: #16a34a; }

.wordmark-light .sub {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: #16a34a;
  text-transform: uppercase;
  padding-left: 2px;
}

.light-banner .corner-tag {
  position: absolute;
  z-index: 3;
  bottom: 22px;
  right: 32px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #16a34a;
  background: #dcfce7;
  border: 1px solid #bbf7d0;
  padding: 4px 10px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ICON */
.icon-section {
  display: flex;
  gap: 20px;
  align-items: flex-end;
  flex-wrap: wrap;
}

.icon-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.icon-item span {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  color: var(--color-text-tertiary);
}

.app-icon {
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(145deg, #1a7a3a 0%, #0f5c28 60%, #0a3d1a 100%);
}

.app-icon::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.2) 0%, transparent 55%),
    linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 50%);
}

.app-icon.lg::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 10px 10px;
}

.app-icon svg { position: relative; z-index: 1; }

.icon-xl { width: 80px; height: 80px; border-radius: 22px; }
.icon-lg { width: 60px; height: 60px; border-radius: 16px; }
.icon-md { width: 44px; height: 44px; border-radius: 12px; }
.icon-sm { width: 32px; height: 32px; border-radius: 9px; }
.icon-xs { width: 20px; height: 20px; border-radius: 5px; }

hr.div { border: none; border-top: 0.5px solid var(--color-border-tertiary); }
</style>
